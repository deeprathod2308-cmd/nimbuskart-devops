name: Cost Janitor CI

on:
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write
  contents: read

jobs:
  cost-janitor:
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack:3.4
        ports:
          - 4566:4566
        env:
          SERVICES: ec2,s3,iam,sts
          DEFAULT_REGION: us-east-1
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r janitor/requirements.txt moto pytest

      - name: Run Terraform
        working-directory: ./terraform
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Run Cost Janitor
        id: janitor
        run: |
          python janitor/janitor.py --dry-run
          if [ -s janitor/report.md ]; then
            echo "ORPHANS_FOUND=true" >> $GITHUB_ENV
          else
            echo "ORPHANS_FOUND=false" >> $GITHUB_ENV
          fi

      - name: Post PR comment
        if: github.event_name == 'pull_request' && env.ORPHANS_FOUND == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('janitor/report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Cost Janitor Found Orphans\n\n${summary}`
            });

      - name: Run unit tests
        working-directory: janitor
        run: pytest test_janitor.py -v

      - name: Fail if orphans found
        if: env.ORPHANS_FOUND == 'true'
        run: |
          echo "Orphan resources detected! Failing build as per requirements."
          exit 1