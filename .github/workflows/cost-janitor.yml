name: Cost Janitor CI

on:
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write
  contents: read

jobs:
  run-cost-janitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r janitor/requirements.txt
          # Agar pytest dependencies hain toh unhe bhi install karein
          pip install pytest

      - name: Start LocalStack
        run: |
          pip install localstack
          localstack start -d
          localstack wait -t 30

      - name: Run Terraform
        working-directory: ./terraform
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Run Cost Janitor Script
        id: janitor
        run: |
          # Python script ko run karo aur output ko markdown file me save karo
          python janitor/janitor.py --dry-run
          
          # Check karo agar report.md file bani hai aur usme data hai
          if [ -s janitor/report.md ]; then
            echo "ORPHANS_FOUND=true" >> $GITHUB_ENV
          else
            echo "ORPHANS_FOUND=false" >> $GITHUB_ENV
          fi

      - name: Post PR comment
        if: github.event_name == 'pull_request' && env.ORPHANS_FOUND == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('janitor/report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `##  Cost Janitor Found Orphans\n\n${summary}`
            });

      - name: Run unit tests
        working-directory: janitor
        run: pytest test_janitor.py -v

      - name: Fail if orphans found
        if: env.ORPHANS_FOUND == 'true'
        run: |
          echo "Orphan resources detected! Failing build as per requirements."
          exit 1