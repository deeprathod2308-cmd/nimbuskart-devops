name: Cost Janitor CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  cost-janitor:
    name: Run Cost Janitor
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack:3.4
        ports:
          - 4566:4566
        env:
          SERVICES: ec2,s3,iam,sts
          DEFAULT_REGION: us-east-1
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r janitor/requirements.txt moto pytest

      - name: Install terraform-local
        run: pip install terraform-local

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Wait for LocalStack
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:4566/_localstack/health && break
            echo "Waiting... ($i/20)"
            sleep 5
          done

      - name: Terraform Init
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: tflocal init

      - name: Terraform Apply
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: tflocal apply -auto-approve

      - name: Run Cost Janitor
        id: janitor
        working-directory: janitor
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
        run: |
          python janitor.py \
            --dry-run \
            --endpoint-url http://localhost:4566 \
            --output report.json \
            --output-md report.md || echo "ORPHANS_FOUND=true" >> $GITHUB_ENV

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cost-janitor-report
          path: |
            janitor/report.json
            janitor/report.md

      - name: Post PR comment
        if: github.event_name == 'pull_request' && env.ORPHANS_FOUND == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('janitor/report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Cost Janitor Found Orphans\n\n${summary}`
            });

      - name: Run unit tests
        working-directory: janitor
        run: pytest test_janitor.py -v

      - name: Fail if orphans found
        if: env.ORPHANS_FOUND == 'true'
        run: exit 1